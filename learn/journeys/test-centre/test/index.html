// ── Custom modal ────────────────────────────────────────────────────────
function showModal(message, title = "Attention") {
    const modal = document.getElementById('custom-modal');
    const titleEl = document.getElementById('modal-title');
    const msgEl = document.getElementById('modal-message');
    const closeBtn = document.getElementById('modal-close-btn');

    titleEl.textContent = title;
    msgEl.textContent = message;

    modal.classList.add('show');

    // One-time close handlers
    const closeModal = () => {
        modal.classList.remove('show');
        closeBtn.removeEventListener('click', closeModal);
        modal.removeEventListener('click', onBackdropClick);
    };

    const onBackdropClick = (e) => {
        if (e.target === modal) closeModal();
    };

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', onBackdropClick);
}

// Helper for common cases
function showError(message) {
    showModal(message, "Oops!");
}

function showInfo(message) {
    showModal(message, "Information");
}

function getTestData(id) {
    return allTests[id] || null;
}

async function loadUser() {
    return new Promise(resolve => {
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) userData = snap.data();
            }
            resolve();
        });
    });
}

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function renderIntro() {
    currentView = 'intro';
    const test = getTestData(testId);
    if (!test) {
        document.getElementById('main-content').innerHTML = `<div class="text-center py-20"><h2 class="text-3xl font-bold text-red-600">${t('testNotFound')}</h2><button onclick="goBackToMenu()" class="btn btn-next mt-8">Back to Menu</button></div>`;
        updateBottomBar();
        return;
    }
    document.getElementById('main-content').innerHTML = `
        <div class="text-center mt-8">
            <div class="text-[88px] font-black text-[#f24b0b] leading-none mb-6">20</div>
            <p class="text-3xl font-semibold mb-4">Random questions</p>
            <div class="text-4xl font-black text-[#222] mb-8">${test.title}</div>
            <button onclick="startTest()" class="btn btn-next text-2xl py-6 px-14 mx-auto">
                <i class="fa-solid fa-play mr-3"></i> Start
            </button>
        </div>`;
    updateBottomBar();
}

function renderQuiz() {
    currentView = 'quiz';
    const q = selectedQuestions[currentQuestionIndex];
    const progress = ((currentQuestionIndex + 1) / 20) * 100;

    let optionsHTML = '';
    q.o.forEach((option, i) => {
        const selected = userAnswers[currentQuestionIndex] === i ? 'selected' : '';
        optionsHTML += `
            <div class="option ${selected}" onclick="selectOption(${i})">
                <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                <span>${option}</span>
            </div>`;
    });

    document.getElementById('main-content').innerHTML = `
        <div style="padding:24px 16px; background: linear-gradient(135deg, #f24b0b, #f1192e); color: white; border-radius: 20px; margin-bottom: 20px;">
            <div class="flex justify-between items-center text-sm">
                <div>
                    <span>${t('question')}</span>
                    <span class="text-4xl font-black ml-2">${currentQuestionIndex + 1}</span>
                    <span class="opacity-75"> ${t('of')} 20</span>
                </div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        <div class="question-text">${q.q}</div>
        ${optionsHTML}`;

    // Give browser time to layout → then show bar
    requestAnimationFrame(() => {
        updateBottomBar();
    });

    updateQuizNav();
}

function renderResults(correctCount, percentage) {
    currentView = 'results';
    lastCorrectCount = correctCount;
    lastPercentage = percentage;

    document.getElementById("quiz-nav").classList.remove("visible");

    const hasTakenBefore = !!userData.completedTests?.[testId];

    // Reward logic (unchanged)
    let diamondsAdd = 0;
    let coinsAdd = 0;
    let rewardText = "";

    if (!hasTakenBefore) {
        if (correctCount > 17) {
            diamondsAdd = 1;
            coinsAdd = 100;
            rewardText = `+1 diamond & +100 coins`;
        } else if (correctCount > 14) {
            coinsAdd = 90;
            rewardText = `+90 coins`;
        } else {
            coinsAdd = 40;
            rewardText = `+40 coins`;
        }
    }

    // Message logic (unchanged)
    let message = "";
    if (hasTakenBefore) {
        message = correctCount > 17 
            ? t('congratulations')
            : (correctCount > 14 ? t('goodJob') : t('keepGoing'));
    }

    const rewardHTML = rewardText 
        ? `<div class="reward-badge"><i class="fa-solid fa-gem"></i> ${rewardText}</div>`
        : '';

    // ── NEW: Prepare wrong answers review ────────────────────────────────
    let wrongAnswersHTML = '';

    if (correctCount < 20) {
        wrongAnswersHTML = `
        <div class="review-section">
            <details>
                <summary class="review-toggle">
                    Review mistakes (${20 - correctCount})
                </summary>
                <div class="review-content">
        `;

        selectedQuestions.forEach((q, index) => {
            const userChoice = userAnswers[index];
            if (userChoice !== q.c) {   // only wrong ones
                const userSelectedText = q.o[userChoice] ?? '— not answered —';
                const correctText      = q.o[q.c];

                wrongAnswersHTML += `
                    <div class="wrong-question">
                        <div class="wrong-question-header">
                            Question ${index + 1}
                        </div>
                        <div style="margin-bottom: 1rem; font-weight: 500;">
                            ${q.q}
                        </div>
                        <div class="user-answer">
                            Your answer: ${userSelectedText}
                        </div>
                        <div class="correct-answer">
                            Correct answer: <strong>${correctText}</strong>
                        </div>
                    </div>
                `;
            }
        });

        wrongAnswersHTML += `
                </div>
            </details>
        </div>`;
    }
    // ─────────────────────────────────────────────────────────────────────

    document.getElementById('main-content').innerHTML = `
        <div class="results">
            <div class="score-circle" style="--score: ${percentage}%">
                <div class="score-circle-inner">${correctCount}<span class="text-3xl text-gray-400">/20</span></div>
            </div>
            <div class="text-3xl font-black text-[#f24b0b]">${percentage}%</div>
            ${message ? `<h2 class="text-3xl font-bold mt-6 mb-8">${message}</h2>` : '<div class="h-12"></div>'}
            ${rewardHTML}
            <div class="flex gap-6 justify-center mt-16 mb-8">
                <button onclick="restartTest()" class="btn btn-next">${t('retake')}</button>
                <button onclick="goBackToMenu()" class="btn btn-prev">${t('backToMenu')}</button>
            </div>

            <!-- Wrong answers review section -->
            ${wrongAnswersHTML}
        </div>`;

    updateBottomBar();
}

function updateBottomBar() {
    const bar = document.getElementById('quiz-bottom-bar');
    if (!bar) return;

    const shouldShow = currentView === 'quiz';
    bar.classList.toggle('visible', shouldShow);

    if (!shouldShow) return;

    const prevBtn = document.getElementById('bottom-prev');
    const nextBtn = document.getElementById('bottom-next');
    const finishBtn = document.getElementById('bottom-finish');

    const isFirst = currentQuestionIndex === 0;
    prevBtn.disabled = isFirst;

    const isLast = currentQuestionIndex >= 19;
    nextBtn.classList.toggle('hidden', isLast);
    finishBtn.classList.toggle('hidden', !isLast);
}

function updateQuizNav(){

    const prev = document.getElementById("quiz-prev");
    const next = document.getElementById("quiz-next");
    const finish = document.getElementById("quiz-finish");

    prev.disabled = currentQuestionIndex === 0;

    if(currentQuestionIndex === 19){
        next.classList.add("hidden");
        finish.classList.remove("hidden");
    }else{
        next.classList.remove("hidden");
        finish.classList.add("hidden");
    }

}

function selectOption(index) {
    userAnswers[currentQuestionIndex] = index;
    renderQuiz();
}

function startTest() {
    const test = getTestData(testId);
    if (!test) return;

    selectedQuestions = shuffle([...test.questions]).slice(0, 20);
    userAnswers = new Array(20).fill(null);
    currentQuestionIndex = 0;
    currentView = "quiz";

    document.getElementById("quiz-nav").classList.add("visible");

    renderQuiz();
}

function nextQuestion() {
    if (userAnswers[currentQuestionIndex] === null) {
        // alert(t('selectOption'));
        showModal(t('selectOption'), "Please select");
        return;
    }
    if (currentQuestionIndex < 19) {
        currentQuestionIndex++;
        renderQuiz();
    }
}

function prevQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuiz();
    }
}

async function finishTest() {
    if (userAnswers.includes(null)) {
        showModal("Please answer all questions before finishing!", "Incomplete Test");
        return;
    }

    const correctCount = userAnswers.reduce((acc, ans, i) => 
        ans === selectedQuestions[i].c ? acc + 1 : acc, 0);

    const percentage = Math.round((correctCount / 20) * 100);

    const isLevelTest = ["level_a1-a2", "level_b1", "level_b2-c1"].includes(testId);
    const alreadyPassed = isLevelTest && userData.completedTests?.[testId] >= 18;

    if (alreadyPassed) {
        showModal(
            "You have already successfully passed this level test!\nNo need to retake it :)",
            "Already Passed"
        );
        renderResults(userData.completedTests[testId], 
                      Math.round((userData.completedTests[testId] / 20) * 100));
        return;
    }

    const shouldSaveAndReward = 
        !alreadyPassed &&   // already checked above, but kept for clarity
        (
            testId.startsWith("vocab_") || 
            testId.startsWith("grammar_") ||
            (isLevelTest && correctCount >= 18)
        );

    let diamondsAdd = 0;
    let coinsAdd = 0;

    if (shouldSaveAndReward) {
        if (correctCount > 17) {
            diamondsAdd = 1;
            coinsAdd = 100;
        } else if (correctCount > 14) {
            coinsAdd = 90;
        } else {
            coinsAdd = 40;
        }
    }

    // ── Update Firestore only if passed (for level tests) ───────────
    if (shouldSaveAndReward && currentUser) {
        const userRef = doc(db, "users", currentUser.uid);
        const updateData = {
            [`completedTests.${testId}`]: correctCount
        };

        if (diamondsAdd) updateData.diamonds = increment(diamondsAdd);
        if (coinsAdd)    updateData.coins    = increment(coinsAdd);

        try {
            await updateDoc(userRef, updateData);
            // Optional: refresh local userData
            userData.completedTests = userData.completedTests || {};
            userData.completedTests[testId] = correctCount;
            if (diamondsAdd) userData.diamonds = (userData.diamonds || 0) + diamondsAdd;
            if (coinsAdd)    userData.coins    = (userData.coins    || 0) + coinsAdd;
        } catch (err) {
            console.error("Failed to save test result", err);
        }
    }

    // Always show results (even on fail / no save)
    renderResults(correctCount, percentage);
}

function restartTest() {
    startTest();
}

function goBackToMenu() {
    window.location.href = '/learn/journeys/test-centre/';
}

window.selectOption = selectOption;
window.startTest = startTest;
window.nextQuestion = nextQuestion;
window.prevQuestion = prevQuestion;
window.finishTest = finishTest;
window.restartTest = restartTest;
window.goBackToMenu = goBackToMenu;

function reRenderCurrentScreen() {
    if (currentView === 'intro') renderIntro();
    else if (currentView === 'quiz') renderQuiz();
    else if (currentView === 'results') renderResults(lastCorrectCount, lastPercentage);
}

window.addEventListener('load', async () => {
    await loadUser();

    const params = new URLSearchParams(window.location.search);
    testId = params.get('id');

    if (!testId || !getTestData(testId)) {
        document.getElementById('main-content').innerHTML = `<div class="text-center py-20 text-3xl font-bold">Test not found</div>`;
        hideLoader();
        return;
    }

    renderIntro();
    document.getElementById("quiz-prev").onclick = prevQuestion;
    document.getElementById("quiz-next").onclick = nextQuestion;
    document.getElementById("quiz-finish").onclick = finishTest;

    document.getElementById('lang-btn')?.addEventListener('click', e => {
        e.stopPropagation();
        document.getElementById('lang-flags')?.classList.toggle('show');
    });

    document.querySelectorAll('.flag').forEach(el => {
        el.addEventListener('click', e => {
            e.stopPropagation();
            currentLang = el.dataset.lang;
            localStorage.setItem('summage_preferred_lang', currentLang);
            document.documentElement.lang = currentLang;
            reRenderCurrentScreen();
            document.getElementById('lang-flags')?.classList.remove('show');
        });
    });

    document.addEventListener('click', () => {
        document.getElementById('lang-flags')?.classList.remove('show');
    });

    document.getElementById('bottom-prev')?.addEventListener('click', prevQuestion);
    document.getElementById('bottom-next')?.addEventListener('click', nextQuestion);
    document.getElementById('bottom-finish')?.addEventListener('click', finishTest);

    function hideLoader() {
        const loader = document.getElementById('pageLoader');
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 1200);
    }
    setTimeout(hideLoader, 600);
});
    </script>
</body>
</html>
