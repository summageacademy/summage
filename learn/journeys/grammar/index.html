    <style>
        /* ──────────────────────────────────────────────── */
        /*           HIDE SCROLLBARS COMPLETELY             */
        /* ──────────────────────────────────────────────── */
        html, body {
            scrollbar-width: none;          /* Firefox */
            -ms-overflow-style: none;       /* IE & legacy Edge */
        }
        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        .content::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
            background: transparent;
        }
        ::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }
        * {
            -webkit-overflow-scrolling: touch;
        }

        /* ──────────────────────────────────────────────── */
        /*                  Summage Style                   */
        /* ──────────────────────────────────────────────── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        html[lang="ru"] * {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fffaf5 0%, #f8f9fa 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Top Navbar - Blends with background */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 5vw;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* Back Button - Properly centered text + arrow */
        .back-btn {
            padding: 12px 28px;
            background: #f1192e;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c40e20;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 120px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #c40e20;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(242, 75, 11, 0.15);
        }

        .logo-text {
            font-size: 26px;
            font-weight: 800;
            color: #f24b0b;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .language-selector { position: relative; }
        .language-button {
            background: none;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.25s ease;
        }
        .language-button:hover {
            background-color: rgba(242, 75, 11, 0.1);
            transform: scale(1.12);
        }
        .language-button img { width: 26px; height: 26px; }

                .language-flags {
            position: absolute;
            top: 140%;                    /* slightly closer to button */
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.25s ease;
            pointer-events: none;
            min-width: 140px;             /* ← This fixes the overflow */
            padding: 8px 0;
            overflow: hidden;
            z-index: 200;
        }
        
        .language-flags.show { 
            opacity: 1; 
            transform: translateY(0); 
            pointer-events: all; 
        }

        .flag {
            padding: 13px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            white-space: nowrap;          /* ← Prevents text wrapping */
            font-size: 15.5px;
            color: #333;
        }

        .flag:hover { 
            background: #f24b0b10; 
        }

        .flag img { 
            width: 28px; 
            height: 28px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        /* Main Content */
        .content {
            flex: 1;
            padding: 60px 5vw 120px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
        }

        .level-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }
        .level-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: #f24b0b;
            line-height: 1;
        }
        .level-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #222;
        }
        .level-desc {
            font-size: 1.1rem;
            color: #666;
            margin-top: 4px;
        }

        /* Lesson Cards - Light Summage Style */
        .lesson-card {
            background: white;
            border: 1px solid #f0e6d9;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            height: 100%;                    /* ← Makes all cards same height */
        }
        .lesson-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(242, 75, 11, 0.12);
        }
        .lesson-header {
            padding: 28px 28px 20px;
            flex: 1;                         /* ← Pushes footer to bottom */
            display: flex;
            flex-direction: column;
        }
        .lesson-id {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #f24b0b;
            text-transform: uppercase;
        }
        .lesson-title {
            font-size: 1.55rem;
            font-weight: 700;
            color: #222;
            margin-top: 6px;
        }
        .lesson-desc {
            margin-top: 16px;
            font-size: 15.5px;
            line-height: 1.55;
            color: #555;
            flex: 1;                         /* ← Extra space goes here */
        }

        .lesson-footer {
            border-top: 1px solid #f0e6d9;
            padding: 20px 28px;
            background: #fffaf5;
            margin-top: auto;                /* ← Forces button to bottom */
        }

        .start-btn {
            background: #f24b0b;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 15px;
            padding: 16px;
            border: none;
            border-radius: 50px;
            width: 100%;
            box-shadow: 0 4px 0 #c23a0a;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #c23a0a;
        }
        .locked-btn {
            background: #f4f4f4;
            color: #999;
            font-weight: 600;
            padding: 16px;
            border-radius: 50px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: not-allowed;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 2px solid #f24b0b;
            color: #222;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(242, 75, 11, 0.15);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 9999;
            animation: toastPop 0.4s ease;
        }

        @keyframes toastPop {
            from { opacity: 0; transform: translate(-50%, 30px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* Mobile Bottom Bar */
        .mobile-footer-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            padding: 14px 5vw;
            border-top: 1px solid rgba(0,0,0,0.08);
            z-index: 100;
        }
        .mobile-back-btn {
            width: 100%;
            max-width: 90vw;
            margin: 0 auto;
            padding: 16px;
            background: #f24b0b;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 15px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 0 #c23a0a;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (max-width: 900px) {
            .content { padding: 40px 20px 100px; }
            .level-title { font-size: 1.9rem; }
            .navbar { padding: 20px; justify-content: space-between; }
            .mobile-footer-bar { display: block; }
            .back-btn { display: none}
        }

        /* Page loader / splash screen */
        .page-loader {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fffaf5 0%, #f8f9fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #splashOwl {
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: opacity, transform;
        }

        @media (prefers-reduced-motion: reduce) {
            #splashOwl,
            .page-loader,
            .page-loader.hidden {
                transition: none !important;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body>
    <!-- Full-page loader with Lottie -->
    <div id="pageLoader" class="page-loader">
        <lottie-player 
            id="splashOwl"
            src="/assets/Sandy Loading.json"
            background="transparent" 
            speed="0.9" 
            style="width: 120px; height: 120px; opacity: 0; transform: scale(0.7) translateY(20px);"
            loop 
            autoplay>
        </lottie-player>
    </div>
    <!-- Navbar -->
    <nav class="navbar">
        <button onclick="goBack()" class="back-btn" id="desktop-back-btn">
            <span data-key="back">Back</span>
        </button>

        <div class="logo-container" onclick="window.location.href='/'">
            <img class="logo-img" src="/assets/logo.webp" alt="Summage Logo">

        </div>

        <div class="language-selector">
            <button class="language-button" id="lang-btn" aria-label="Select language">
                <img src="/assets/images/lang/globe.webp" alt="">

                <div class="flag" data-lang="en"><img src="/assets/images/lang/en.png" alt="EN"> English</div>

    <!-- Main Content -->
    <main class="content" id="lessons-container">
        <!-- Loaded by JS -->
    </main>

    <!-- Mobile Fixed Back Button -->
    <div class="mobile-footer-bar">
        <button onclick="goBack()" class="mobile-back-btn" id="mobile-back-btn">
            <span data-key="back">Back</span>
        </button>
    </div>

    <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDX73k3QqXr9xu_PKkQBkr9pUNp7zmtrW0",
        authDomain: "summage-backend.firebaseapp.com",
        projectId: "summage-backend",
        storageBucket: "summage-backend.firebasestorage.app",
        messagingSenderId: "128191434358",
        appId: "1:128191434358:web:4c9e9f4f9ff4a23db5d957"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const allLessons = [
        { id: 1, title: "Present Simple", desc: "I work, you work, he works", level: "beginner" },
        { id: 2, title: "Present Continuous", desc: "I am working right now", level: "beginner" },
        { id: 3, title: "Past Simple", desc: "I worked yesterday", level: "beginner" },
        { id: 4, title: "Future with 'Will'", desc: "I will call you tomorrow", level: "beginner" },
        { id: 5, title: "Articles a / an / the", desc: "The sun, a cat, an apple", level: "beginner" },
        { id: 6, title: "Prepositions of Place", desc: "in, on, at, under", level: "beginner" },
        { id: 7, title: "Possessive Adjectives", desc: "my, your, his, her", level: "beginner" },
        { id: 8, title: "Yes/No Questions", desc: "Do you like coffee?", level: "beginner" },
        { id: 9, title: "Can / Can't", desc: "I can swim", level: "beginner" },
        { id: 10, title: "Present Perfect", desc: "I have just finished", level: "intermediate" },
        { id: 11, title: "Past Continuous", desc: "I was sleeping when...", level: "intermediate" },
        { id: 12, title: "Past Perfect", desc: "I had already left", level: "intermediate" },
        { id: 13, title: "Future Continuous", desc: "I will be working at 8pm", level: "intermediate" },
        { id: 14, title: "Modal Verbs", desc: "should, must, may, might", level: "intermediate" },
        { id: 15, title: "Comparatives & Superlatives", desc: "bigger, the biggest", level: "intermediate" },
        { id: 16, title: "Passive Voice", desc: "The book was written by...", level: "intermediate" },
        { id: 17, title: "First & Second Conditionals", desc: "If I win, I will...", level: "intermediate" },
        { id: 18, title: "Reported Speech", desc: "He said that...", level: "intermediate" },
        { id: 19, title: "Present Perfect Continuous", desc: "I have been studying for 3 hours", level: "advanced" },
        { id: 20, title: "Past Perfect Continuous", desc: "I had been waiting...", level: "advanced" },
        { id: 21, title: "Third Conditional", desc: "If I had known...", level: "advanced" },
        { id: 22, title: "Mixed Conditionals", desc: "If I were rich, I would have...", level: "advanced" },
        { id: 23, title: "Inversion & Emphasis", desc: "Never have I seen...", level: "advanced" },
        { id: 24, title: "Causative Verbs", desc: "have something done", level: "advanced" },
        { id: 25, title: "Relative Clauses", desc: "The man who lives next door...", level: "advanced" },
        { id: 26, title: "Subjunctive Mood", desc: "I suggest that he go", level: "advanced" },
        { id: 27, title: "Advanced Phrasal Verbs", desc: "put up with, look forward to", level: "advanced" }
    ];

    let currentUserLevel = "beginner";
    let completedLessons = {};   // ← NEW: will hold { "1": true, "5": true, ... }

    const translations = {
        en: {
            back: "Back",
            loading: "Loading your progress...",
            signIn: "Please sign in to access personalized lessons",
            signInBtn: "Sign In",
            yourLevel: "Your level",
            beginnerTitle: "Beginner Level",
            beginnerDesc: "Foundation grammar for everyday English",
            intermediateTitle: "Intermediate Level",
            intermediateDesc: "Build fluency and confidence",
            advancedTitle: "Advanced Level",
            advancedDesc: "Master complex structures",
            startLesson: "Start Lesson",
            locked: "Locked",
            lessonLocked: "Lesson locked",
            completePrevious: "Complete previous levels to unlock",
            retake: "Retake"
        },
        ru: {
            back: "Назад",
            loading: "Загрузка вашего прогресса...",
            signIn: "Пожалуйста, войдите, чтобы увидеть персонализированные уроки",
            signInBtn: "Войти",
            yourLevel: "Ваш уровень",
            beginnerTitle: "Начальный уровень",
            beginnerDesc: "Основы грамматики для повседневного английского",
            intermediateTitle: "Средний уровень",
            intermediateDesc: "Развивайте беглость и уверенность",
            advancedTitle: "Продвинутый уровень",
            advancedDesc: "Осваивайте сложные конструкции",
            startLesson: "Начать урок",
            locked: "Заблокировано",
            lessonLocked: "Урок заблокирован",
            completePrevious: "Завершите предыдущие уровни, чтобы разблокировать",
            retake: "Повторить"

        },
        uz: {
            back: "Orqaga",
            loading: "Sizning taraqqiyotingiz yuklanmoqda...",
            signIn: "Shaxsiy darslarni ko'rish uchun tizimga kiring",
            signInBtn: "Kirish",
            yourLevel: "Sizning darajangiz",
            beginnerTitle: "Boshlang'ich daraja",
            beginnerDesc: "Kundalik ingliz tili uchun asosiy grammatika",
            intermediateTitle: "O'rta daraja",
            intermediateDesc: "Ravshanlik va ishonchni oshiring",
            advancedTitle: "Ilg'or daraja",
            advancedDesc: "Murakkab tuzilmalarni o'zlashtiring",
            startLesson: "Darsni boshlash",
            locked: "Bloklangan",
            lessonLocked: "Dars bloklangan",
            completePrevious: "Oldingi darajalarni tugatib, oching",
            retake: "Qaytarish"
        }
    };

    let currentLang = localStorage.getItem('summage_preferred_lang') || 'en';

    function t(key) {
        return translations[currentLang]?.[key] || translations.en[key] || key;
    }

    function updateLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('summage_preferred_lang', lang);
        document.documentElement.lang = lang;
        renderAllLessons();
    }

    // ====================== FIREBASE + PROGRESS READING ======================
    async function loadUserData() {
        const container = document.getElementById("lessons-container");

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // 1. Read user level
                    const userSnap = await getDoc(doc(db, "users", user.uid));
                    if (userSnap.exists()) {
                        currentUserLevel = userSnap.data().level || "beginner";
                    }

                    // 2. Read completed grammar lessons (exactly where lesson page saves them)
                    const progressSnap = await getDoc(doc(db, "users", user.uid, "progress", "grammar"));
                    completedLessons = progressSnap.exists() 
                        ? (progressSnap.data().lessons || {}) 
                        : {};

                    renderAllLessons();
                } catch (e) {
                    console.error("Firestore error:", e);
                    renderAllLessons();
                }
            } else {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-xl">${t('signIn')}</p>
                        <a href="/login" class="inline-block mt-6 bg-[#f24b0b] text-white font-bold py-4 px-12 rounded-3xl">${t('signInBtn')}</a>
                    </div>`;
                setTimeout(hideLoader, 800);
            }
        });
    }

    function getMaxUnlockedLessons() {
        return currentUserLevel === "beginner" ? 9 
             : currentUserLevel === "intermediate" ? 18 
             : 27;
    }

    function renderAllLessons() {
        const container = document.getElementById("lessons-container");
        const max = getMaxUnlockedLessons();

        let html = `
            <div class="max-w-6xl mx-auto">
                <div class="mb-16">
                    <div class="level-header">
                        <div class="level-number">01</div>
                        <div>
                            <h2 class="level-title">${t('beginnerTitle')}</h2>
                            <p class="level-desc">${t('beginnerDesc')}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="beginner-grid"></div>
                </div>
                <div class="mb-16">
                    <div class="level-header">
                        <div class="level-number">02</div>
                        <div>
                            <h2 class="level-title">${t('intermediateTitle')}</h2>
                            <p class="level-desc">${t('intermediateDesc')}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="intermediate-grid"></div>
                </div>
                <div>
                    <div class="level-header">
                        <div class="level-number">03</div>
                        <div>
                            <h2 class="level-title">${t('advancedTitle')}</h2>
                            <p class="level-desc">${t('advancedDesc')}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="advanced-grid"></div>
                </div>
            </div>
        `;
        container.innerHTML = html;

        renderGroup("beginner", 0, 9, max);
        renderGroup("intermediate", 9, 18, max);
        renderGroup("advanced", 18, 27, max);

        if (minTimePassed) hideLoader();
    }

    function renderGroup(group, start, end, max) {
        const grid = document.getElementById(group + "-grid");
        let html = "";

        for (let i = start; i < end; i++) {
            const l = allLessons[i];
            const unlocked = l.id <= max;
            const isCompleted = !!completedLessons[l.id];

            html += `
                <div class="lesson-card">
                    <div class="lesson-header relative">
                        <div class="lesson-id">LESSON ${l.id}</div>
                        <div class="lesson-title">${l.title}</div>
                        <p class="lesson-desc">${l.desc}</p>
                    </div>
                    
                    <div class="lesson-footer">
                        ${unlocked ? `
                            <a href="/learn/journeys/grammar/lesson/?id=${l.id}" 
                            class="${isCompleted 
                                    ? 'w-full py-4 px-6 text-white font-bold uppercase tracking-wide rounded-full bg-[#06a87c] shadow-[0_4px_0_#058f66] hover:shadow-[0_6px_0_#058f66] hover:-translate-y-0.5 active:translate-y-0.5 active:shadow-[0_2px_0_#058f66] transition-all duration-150 flex items-center justify-center gap-2' 
                                    : 'start-btn'}">
                                ${isCompleted ? t('retake') : t('startLesson')}
                            </a>
                        ` : `
                            <button onclick="showLockedToast()" class="locked-btn">
                                <i class="fa-solid fa-lock"></i> ${t('locked')}
                            </button>
                        `}
                    </div>
                </div>
            `;
        }
        grid.innerHTML = html;
    }

    function showLockedToast() {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `
            <i class="fa-solid fa-lock text-2xl text-[#f24b0b]"></i>
            <div>
                <div style="font-weight:700;">${t('lessonLocked')}</div>
                <div style="font-size:13px;color:#777;">${t('completePrevious')}</div>
            </div>
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.transition = "all 0.4s";
            toast.style.opacity = "0";
            setTimeout(() => toast.remove(), 400);
        }, 2600);
    }

    function goBack() {
        window.location.assign('/learn/');
    }

    // SPLASH SCREEN LOGIC (unchanged)
    const loader = document.getElementById('pageLoader');
    const owl = document.getElementById('splashOwl');
    const MIN_DURATION = 1600;
    let minTimePassed = false;

    setTimeout(() => { if (owl) { owl.style.opacity = '1'; owl.style.transform = 'scale(1) translateY(0)'; } }, 400);
    setTimeout(() => { minTimePassed = true; if (document.readyState === 'complete') hideLoader(); }, MIN_DURATION);
    window.addEventListener('load', () => { if (minTimePassed) hideLoader(); else setTimeout(hideLoader, MIN_DURATION); });
    function hideLoader() {
        if (!loader || loader.classList.contains('hidden')) return;
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 1400);
    }
    setTimeout(() => hideLoader(), 8000);

    // ====================== EVENT LISTENERS ======================
    window.addEventListener('load', () => {
        loadUserData();   // ← now loads BOTH level + completed lessons

        // Language selector
        document.getElementById('lang-btn')?.addEventListener('click', e => {
            e.stopPropagation();
            document.getElementById('lang-flags').classList.toggle('show');
        });

        document.querySelectorAll('.flag').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                updateLanguage(el.dataset.lang);
                document.getElementById('lang-flags').classList.remove('show');
            });
        });

        document.addEventListener('click', () => {
            document.getElementById('lang-flags').classList.remove('show');
        });

        document.getElementById('desktop-back-btn')?.addEventListener('click', goBack);
        document.getElementById('mobile-back-btn')?.addEventListener('click', goBack);
    });
</script>
</body>
</html>
