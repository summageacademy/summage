<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grammar Adventure – Summage</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LZP4KSPR1V"></script>
  <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
  
      gtag('config', 'G-LZP4KSPR1V');
  </script>

  <style>
    :root {
      --primary: #f24b0b;
      --primary-dark: #c23a0a;
      --success: #06a87c;
      --success-dark: #058f66;
      --bg-light: #fffaf5;
      --bg-gradient: linear-gradient(135deg, #fffaf5 0%, #fef3e8 100%);
      --text: #1f2937;
      --text-light: #4b5563;
      --gray: #9ca3af;
      --border: #e5e7eb;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    html, body {
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    body::-webkit-scrollbar,
    html::-webkit-scrollbar { display: none; }

    .app-container { min-height: 100dvh; display: flex; flex-direction: column; }

    .lesson-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 160px;
      gap: 16px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      position: relative;
    }

    @media (min-width: 768px) {
      .lesson-content { padding: 60px 32px 180px; gap: 24px; }
    }

    /* Speaker area – fixed mascot position */
    .speaker-area {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin: 60px auto 140px;
      min-height: 260px;
    }

    @media (min-width: 768px) {
      .speaker-area {
        margin: 80px auto 160px;
        min-height: 280px;
      }
    }

    .speech-bubble {
      width: 100%;
      max-width: 520px;
      background: white;
      padding: 24px 32px;
      border-radius: 28px;
      font-size: 1.18rem;
      line-height: 1.7;
      text-align: center;
      position: absolute;
      bottom: 175px;                    /* fixed distance above mascot – tail always points correctly */
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid #06a87c;
      color: #058f66;
      font-weight: 600;
      opacity: 0;
      transform: translateX(-50%) translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
      overflow: hidden;
      z-index: 2;
    }

    .speech-bubble.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -18px;
      left: 60px;
      border: 18px solid transparent;
      border-top-color: white;
      z-index: 1;
    }

    .speech-bubble::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 32px;
      border: 5px solid #06a87c;
      pointer-events: none;
      z-index: -1;
    }

    @media (min-width: 768px) {
      .speech-bubble {
        font-size: 1.25rem;
        padding: 28px 36px;
        bottom: 185px;                  /* slightly more space on desktop */
      }
    }

    .mascot-wrapper {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;                       /* mascot always behind bubble */
    }

    .mascot {
      width: 160px;
      height: auto;
      border-radius: 32px;
      transition: transform 0.4s ease;
    }

    @media (min-width: 768px) { .mascot { width: 180px; } }

    .explanation-card {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      width: min(90%, 480px);
      max-width: 620px;
      background: white;
      border-radius: 24px;
      padding: 24px 28px;
      box-shadow: 0 14px 48px rgba(0,0,0,0.14);
      border: 2px solid #e5e7eb;
      z-index: 10;
      opacity: 0;
      transform: translate(-50%, 30px);
      transition: all 0.55s cubic-bezier(0.34,1.56,0.64,1);
    }

    @media (min-width: 900px) {
      .explanation-card {
        width: min(85%, 720px);
        max-width: 720px;
        padding: 32px 40px;
        border-radius: 28px;
      }
      .explanation-card h3 { font-size: 1.9rem; }
      .explanation-card .content { font-size: 1.18rem; line-height: 1.9; }
    }

    .explanation-card.visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .explanation-card h3 {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
      text-align: center;
      margin-bottom: 20px;
    }

    .explanation-card .content {
      font-size: 1.04rem;
      line-height: 1.8;
      color: var(--text-light);
    }

    .explanation-card .content strong { color: var(--primary); font-weight: 700; }

    .explanation-card ul, .explanation-card ol {
      margin: 16px 0 24px 32px;
      color: var(--text-light);
    }

    .explanation-card li { margin-bottom: 12px; }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 16px;
      z-index: 100;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
    }

    .nav-container {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 520px;
    }

    .nav-btn {
      flex: none;
      height: 56px;
      font-size: 1.02rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border: none;
      border-radius: 999px;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 0 var(--primary-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 24px;
    }

    .nav-btn.back {
      flex: 6;
      background: var(--success);
      box-shadow: 0 4px 0 var(--success-dark);
    }

    .nav-btn.next {
      flex: 4;
      background: var(--primary);
    }

    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--primary-dark); }
    .nav-btn.back:hover { box-shadow: 0 6px 0 var(--success-dark); }

    .nav-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 4px 0 #c23a0a;
    }

    @media (max-width: 400px) {
      .nav-btn { padding: 14px 24px; font-size: 0.98rem; }
    }

    @media (max-width: 799px) {
      .nav-btn { padding: 16px 32px; font-size: 0.90rem; }
    }

    @media (min-width: 800px) {
      .nav-btn { padding: 16px 32px; }
    }

    #quiz-overlay, .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    .modal-card {
      background: white;
      border-radius: 28px;
      padding: 32px 28px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
      transform: scale(0.92);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    .modal-card.visible {
      transform: scale(1);
      opacity: 1;
    }

    .modal-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .quiz-question {
      font-size: 1.25rem;
      line-height: 1.6;
      margin: 24px 0;
    }

    .option-btn {
      width: 100%;
      padding: 16px 20px;
      margin: 10px 0;
      background: #f9fafb;
      border: 2px solid var(--border);
      border-radius: 16px;
      font-size: 1.1rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.22s;
    }

    .option-btn:hover {
      border-color: var(--primary);
      background: #fff7ed;
      transform: translateX(6px);
    }

    .mascot-result { width: 140px; margin: 0 auto 20px; }

    .result-title { font-size: 2.1rem; font-weight: 800; margin-bottom: 12px; color:#06a87c}

    .result-subtitle {
      color: var(--text-light);
      font-size: 1.12rem;
      margin-bottom: 32px;
    }

    .action-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 999px;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--primary-dark);
      transition: all 0.25s;
    }

    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--primary-dark); }

    .retake-btn {
      background: var(--success);
      box-shadow: 0 4px 0 var(--success-dark);
    }
    .retake-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--success-dark);
    }
  </style>
</head>
<body>

<div class="app-container">

  <div class="lesson-content">
    <!-- Speaker area – mascot now fixed, bubble grows UP -->
    <div class="speaker-area">
      <div class="speech-bubble" id="speechBubble"></div>
      <div class="mascot-wrapper">
        <img id="mascot" class="mascot" src="/assets/images/redy.webp" alt="Mascot">
      </div>
    </div>

    <div class="explanation-card" id="explanationCard">
      <h3 id="cardTitle"></h3>
      <div class="content" id="cardContent"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="nav-container">
      <button class="nav-btn back" id="prev">What was that?</button>
      <button class="nav-btn next" id="next">OK</button>
    </div>
  </div>

  <div id="quiz-overlay">
    <div class="modal-card" id="quizCard">
      <h2 class="modal-title" id="quizTitle">Quick Check</h2>
      <p class="quiz-question" id="quizQuestion"></p>
      <div id="quizOptions"></div>
    </div>
  </div>

  <div id="success-overlay" class="result-overlay">
    <div class="modal-card">
      <img class="mascot-result" src="/assets/images/redy.jpg" alt="Happy">
      <h2 class="result-title">Brilliant!</h2>
      <p class="result-subtitle">You nailed this grammar topic!</p>
      <button class="action-btn" id="toMenu">Menu</button>
    </div>
  </div>

  <div id="fail-overlay" class="result-overlay">
    <div class="modal-card">
      <img class="mascot-result" src="/assets/images/redy3.jpg" alt="Sad">
      <h2 class="result-title">Almost there!</h2>
      <p class="result-subtitle">Let's review and try again<br>You've got this!</p>
      <button class="action-btn retake-btn" id="retry">Try Again</button>
    </div>
  </div>

  <!-- Error Screen -->
  <div id="error-screen" style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center;">
    <img src="/assets/images/redy2.jpg" class="mascot" style="width:180px; margin-bottom:30px;" alt="Mascot">
    <h2 style="font-size:2.2rem; font-weight:800; color:#f24b0b; margin-bottom:16px;">No lesson found</h2>
    <p style="font-size:1.25rem; color:#4b5563; max-width:420px; line-height:1.6;">Oops! This grammar lesson isn't available yet.</p>
    <button onclick="window.location.href='/learn/journeys/grammar/'" class="action-btn" style="margin-top:40px;">Return</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDX73k3QqXr9xu_PKkQBkr9pUNp7zmtrW0",
    authDomain: "summage-backend.firebaseapp.com",
    projectId: "summage-backend",
    storageBucket: "summage-backend.firebasestorage.app",
    messagingSenderId: "128191434358",
    appId: "1:128191434358:web:4c9e9f4f9ff4a23db5d957"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const allLessons = [
    { id: 1, title: "Present Simple", desc: "I work, you work, he works", level: "beginner" },
    { id: 2, title: "Present Continuous", desc: "I am working right now", level: "beginner" },
    { id: 3, title: "Past Simple", desc: "I worked yesterday", level: "beginner" },
    { id: 4, title: "Future with 'Will'", desc: "I will call you tomorrow", level: "beginner" },
    { id: 5, title: "Articles a / an / the", desc: "The sun, a cat, an apple", level: "beginner" },
    { id: 6, title: "Prepositions of Place", desc: "in, on, at, under", level: "beginner" },
    { id: 7, title: "Possessive Adjectives", desc: "my, your, his, her", level: "beginner" },
    { id: 8, title: "Yes/No Questions", desc: "Do you like coffee?", level: "beginner" },
    { id: 9, title: "Can / Can't", desc: "I can swim", level: "beginner" },
    { id: 10, title: "Present Perfect", desc: "I have just finished", level: "intermediate" },
    { id: 11, title: "Past Continuous", desc: "I was sleeping when...", level: "intermediate" },
    { id: 12, title: "Past Perfect", desc: "I had already left", level: "intermediate" },
    { id: 13, title: "Future Continuous", desc: "I will be working at 8pm", level: "intermediate" },
    { id: 14, title: "Modal Verbs", desc: "should, must, may, might", level: "intermediate" },
    { id: 15, title: "Comparatives & Superlatives", desc: "bigger, the biggest", level: "intermediate" },
    { id: 16, title: "Passive Voice", desc: "The book was written by...", level: "intermediate" },
    { id: 17, title: "First & Second Conditionals", desc: "If I win, I will...", level: "intermediate" },
    { id: 18, title: "Reported Speech", desc: "He said that...", level: "intermediate" },
    { id: 19, title: "Present Perfect Continuous", desc: "I have been studying for 3 hours", level: "advanced" },
    { id: 20, title: "Past Perfect Continuous", desc: "I had been waiting...", level: "advanced" },
    { id: 21, title: "Third Conditional", desc: "If I had known...", level: "advanced" },
    { id: 22, title: "Mixed Conditionals", desc: "If I were rich, I would have...", level: "advanced" },
    { id: 23, title: "Inversion & Emphasis", desc: "Never have I seen...", level: "advanced" },
    { id: 24, title: "Causative Verbs", desc: "have something done", level: "advanced" },
    { id: 25, title: "Relative Clauses", desc: "The man who lives next door...", level: "advanced" },
    { id: 26, title: "Subjunctive Mood", desc: "I suggest that he go", level: "advanced" },
    { id: 27, title: "Advanced Phrasal Verbs", desc: "put up with, look forward to", level: "advanced" }
  ];

  const lessons = {
    1: {
      title: "Present Simple",
      bubbles: [
        "Hey there! Ready to master Present Simple?",
        "We use Present Simple for habits, routines and general truths.",
        "Structure: I/You/We/They + verb   |   He/She/It + verb-s/es",
        "Examples: I drink coffee every morning. She speaks three languages.",
        "Negative: don't / doesn't + verb",
        "Questions: Do/Does + subject + verb?",
        "Time expressions: always, usually, every day, often, never...",
        "Got it? Let's check your understanding!"
      ],
      cards: [
        { title: "When do we use it?", content: "<p>Habits • Routines • Facts • States • Timetables</p>" },
        { title: "Affirmative", content: "<p>I play • You play • He plays • She plays • It plays • We play • They play</p>" },
        { title: "Negative & Questions", content: "<p>– I don’t like tea.<br>– Do you live in Tashkent?<br>– Does he work here?</p>" },
        { title: "Common time words", content: "<ul><li>always • usually • often • sometimes • never</li><li>every day/week/month</li><li>on Mondays • in the morning</li></ul>" },
        { title: "Ready for quiz?", content: "<p>Answer 3 quick questions to finish the lesson!</p>" }
      ],
      bubbleToCard: [0,0,1,1,2,2,3,3,4],
      quiz: [
        { q: "She ___ English every evening.", opts: ["study", "studies", "studys", "studying"], ans: 1 },
        { q: "___ you like spicy food?", opts: ["Do", "Does", "Are", "Is"], ans: 0 },
        { q: "We ___ to school by bus.", opts: ["go", "goes", "going", "gone"], ans: 0 }
      ]
    },
    2: {
      title: "Articles: a / an / the",
      bubbles: [
        "Hello! Today we're diving into articles — a, an, the",
        "Small words, big difference!",
        "'a' — before consonant SOUND (a cat, a university)",
        "'an' — before vowel SOUND (an apple, an hour)",
        "'the' — when we talk about something specific",
        "No article — general things: I love coffee. Cats are cute.",
        "Ready for the final check?"
      ]
    }
  };

  let lessonId = new URLSearchParams(window.location.search).get('id');
  let lesson = lessons[lessonId];

  const lessonInfo = allLessons.find(l => String(l.id) === lessonId);
  document.title = lessonInfo ? `${lessonInfo.title} - Summage Academy` : "Grammar Ground - Summage Academy";

  if (!lessonId || !lesson) {
    document.querySelector('.lesson-content').style.display = 'none';
    document.querySelector('.bottom-bar').style.display = 'none';
    document.getElementById('error-screen').style.display = 'flex';
  }

  let currentUser = null;
  let bubbleIndex = 0;
  let cardIndex = 0;
  let cooldown = false;
  let animating = false;
  let quizMode = false;
  let score = 0;
  let quizStep = 0;

  const mascots = ["/assets/images/redy.jpg","/assets/images/redy2.jpg","/assets/images/redy3.jpg"];

  const bubbleEl = document.getElementById("speechBubble");
  const mascotEl = document.getElementById("mascot");
  const cardEl = document.getElementById("explanationCard");
  const titleEl = document.getElementById("cardTitle");
  const contentEl = document.getElementById("cardContent");
  const prevBtn = document.getElementById("prev");
  const nextBtn = document.getElementById("next");

  const quizOverlay = document.getElementById("quiz-overlay");
  const quizCard = document.getElementById("quizCard");
  const quizTitle = document.getElementById("quizTitle");
  const quizQ = document.getElementById("quizQuestion");
  const quizOpts = document.getElementById("quizOptions");

  const successOverlay = document.getElementById("success-overlay");
  const failOverlay = document.getElementById("fail-overlay");

  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (!user) signInAnonymously(auth).catch(console.error);
  });

  function showStep(index) {
    if (index < 0 || index >= lesson.bubbles.length) return;
    bubbleIndex = index;
    animating = true;

    mascotEl.src = mascots[Math.floor(Math.random() * mascots.length)];

    bubbleEl.textContent = lesson.bubbles[index];
    bubbleEl.classList.add("visible");

    const targetCard = lesson.bubbleToCard?.[index] ?? 0;
    if (lesson.cards?.[targetCard] && targetCard !== cardIndex) {
      titleEl.textContent = lesson.cards[targetCard].title;
      contentEl.innerHTML = lesson.cards[targetCard].content;
      cardEl.classList.add("visible");
      cardIndex = targetCard;
    }

    nextBtn.disabled = true;
    cooldown = true;

    setTimeout(() => {
      animating = false;
      startCooldown(2.2);
    }, 600);
  }

  function startCooldown(sec) {
    let count = sec;
    const originalText = nextBtn.textContent;
    const timer = setInterval(() => {
      if (count > 0) {
        nextBtn.textContent = Math.ceil(count);
        count -= 0.2;
      } else {
        nextBtn.textContent = originalText;
        cooldown = false;
        if (!quizMode) nextBtn.disabled = false;
        clearInterval(timer);
      }
    }, 200);
  }

  function startQuiz() {
    quizMode = true;
    score = 0;
    quizStep = 0;
    nextBtn.disabled = true;
    showQuizQuestion();
  }

  function showQuizQuestion() {
    if (quizStep >= (lesson.quiz?.length ?? 0)) {
      quizOverlay.style.display = "none";
      quizMode = false;
      if (score === (lesson.quiz?.length ?? 0)) {
        successOverlay.style.display = "flex";
        setTimeout(() => document.querySelector("#success-overlay .modal-card").classList.add("visible"), 100);
        saveProgress();
      } else {
        failOverlay.style.display = "flex";
        setTimeout(() => document.querySelector("#fail-overlay .modal-card").classList.add("visible"), 100);
      }
      return;
    }

    const q = lesson.quiz[quizStep];
    quizTitle.textContent = `Question ${quizStep+1}/${lesson.quiz.length}`;
    quizQ.textContent = q.q;

    quizOpts.innerHTML = "";
    q.opts.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt;
      btn.onclick = () => {
        if (i === q.ans) score++;
        quizStep++;
        showQuizQuestion();
      };
      quizOpts.appendChild(btn);
    });

    quizOverlay.style.display = "flex";
    setTimeout(() => quizCard.classList.add("visible"), 80);
  }

  async function saveProgress() {
    if (!currentUser) return;
    try {
      const ref = doc(db, "users", currentUser.uid, "progress", "grammar");
      await setDoc(ref, { lessons: { [lessonId]: true } }, { merge: true });
    } catch (err) { console.error(err); }
  }

  prevBtn.onclick = () => {
    if (bubbleIndex > 0 && !animating && !quizMode && !cooldown) showStep(bubbleIndex - 1);
  };

  nextBtn.onclick = () => {
    if (animating || quizMode || cooldown) return;
    if (bubbleIndex < lesson.bubbles.length - 1) {
      showStep(bubbleIndex + 1);
    } else {
      startQuiz();
    }
  };

  document.getElementById("toMenu").onclick = () => window.location.href = "/learn/journeys/grammar/";
  document.getElementById("retry").onclick = () => {
    failOverlay.style.display = "none";
    bubbleIndex = 0; cardIndex = 0;
    showStep(0);
  };

  if (lessonId && lesson) showStep(0);
</script>
</body>
</html>
