<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Tests - Summage Academy</title>
    <meta name="description" content="Download free English grammar practice tests from Summage Academy." />
    
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&amp;family=Poppins:wght@600;700;800&amp;display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Logo text always uses Poppins - regardless of language */
        .logo-text {
            font-family: 'Poppins', sans-serif !important;
            font-weight: 800;
            letter-spacing: 1.2px;
        }

        body {
            background: linear-gradient(135deg, #fffaf5 0%, #f8f9fa 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 5vw;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .back-btn {
            padding: 12px 28px;
            background: #f1192e;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c40e20;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #c40e20;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(242, 75, 11, 0.15);
        }

        .logo-text {
            font-size: 26px;
            font-weight: 800;
            color: #f24b0b;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        /* Language Selector */
        .language-selector { position: relative; }
        .language-button {
            background: none;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.25s ease;
        }
        .language-button:hover {
            background-color: rgba(242, 75, 11, 0.1);
            transform: scale(1.12);
        }
        .language-button img { width: 26px; height: 26px; }

        .language-flags {
            position: absolute;
            top: 140%;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.25s ease;
            pointer-events: none;
            min-width: 140px;
            padding: 8px 0;
            z-index: 200;
        }
        .language-flags.show { 
            opacity: 1; 
            transform: translateY(0); 
            pointer-events: all; 
        }

        .flag {
            padding: 13px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            font-size: 15.5px;
            color: #333;
        }
        .flag:hover { background: #f24b0b10; }
        .flag img { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            flex-shrink: 0; 
        }

        /* Main Content */
        .content {
            padding: 60px 5vw 120px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 2.8rem;
            font-weight: 800;
            color: #222;
            text-align: center;
            margin-bottom: 16px;
        }

        .page-subtitle {
            font-size: 1.2rem;
            color: #666;
            text-align: center;
            max-width: 700px;
            margin: 0 auto 60px;
        }

        /* Test Cards */
        .test-card {
            background: white;
            border: 1px solid #f0e6d9;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            height: 100%;
        }

        .test-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(242, 75, 11, 0.15);
        }

        .test-header {
            padding: 32px 28px 24px;
        }

        .test-level {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #f24b0b;
            text-transform: uppercase;
        }

        .test-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #222;
            margin-top: 8px;
            line-height: 1.3;
        }

        .test-desc {
            margin-top: 16px;
            font-size: 15.5px;
            line-height: 1.6;
            color: #555;
        }

        .test-footer {
            border-top: 1px solid #f0e6d9;
            padding: 24px 28px;
            background: #fffaf5;
        }

        .download-btn {
            background: #f24b0b;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 15px;
            padding: 16px;
            border: none;
            border-radius: 50px;
            width: 100%;
            box-shadow: 0 4px 0 #c23a0a;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #c23a0a;
        }

        /* Mobile Bottom Bar */
        .mobile-footer-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            padding: 14px 5vw;
            border-top: 1px solid rgba(0,0,0,0.08);
            z-index: 100;
        }

        .mobile-back-btn {
            width: 90%;
            max-width: 90vw;
            margin: 0 auto;
            padding: 16px;
            background: #f1192e;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-size: 15px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 0 #c40e20;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .mobile-back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #c40e20;
        }

        @media (max-width: 900px) {
            .content { padding: 40px 20px 100px; }
            .page-title { font-size: 2.2rem; }
            .navbar { padding: 20px; }
            .mobile-footer-bar { display: block; }
            .back-btn { display: none; }
        }

        /* Page Loader */
        .page-loader {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #fffaf5 0%, #f8f9fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

                /* ──────────────────────────────────────────────── */
        /*           HIDE SCROLLBARS COMPLETELY             */
        /* ──────────────────────────────────────────────── */
        html, body {
            scrollbar-width: none;          /* Firefox */
            -ms-overflow-style: none;       /* IE & legacy Edge */
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        .content::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
            background: transparent;
        }

        ::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }

        * {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
    <!-- Loader -->
    <div id="pageLoader" class="page-loader">
        <lottie-player 
            src="/assets/Sandy Loading.json"
            background="transparent" 
            speed="0.9" 
            style="width: 120px; height: 120px;"
            loop 
            autoplay>
        </lottie-player>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <button onclick="goBack()" class="back-btn" id="desktop-back-btn">
            <span data-key="back">Back</span>
        </button>

        <div class="logo-container" onclick="window.location.href='/'">
            <img class="logo-img" src="/assets/logo.webp" alt="Summage Logo">
            <div class="logo-text">Summage</div>
        </div>

        <div class="language-selector">
            <button class="language-button" id="lang-btn" aria-label="Select language">
                <img src="/assets/images/lang/globe.webp" alt="">
            </button>
            <div class="language-flags" id="lang-flags">
                <div class="flag" data-lang="en"><img src="/assets/images/lang/en.png" alt="EN"> English</div>
                <div class="flag" data-lang="ru"><img src="/assets/images/lang/ru.png" alt="RU"> Русский</div>
                <div class="flag" data-lang="uz"><img src="/assets/images/lang/uz.png" alt="UZ"> O'zbek</div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="content" id="tests-container">
        <!-- Populated by JavaScript -->
    </main>

    <!-- Mobile Fixed Back Button -->
    <div class="mobile-footer-bar">
        <button onclick="goBack()" class="mobile-back-btn">
            <span data-key="back">Back</span>
        </button>
    </div>

    <script>
        // Translations
        const translations = {
            en: {
                back: "Back",
                practiceTests: "Practice Tests",
                subtitle: "Sharpen your grammar skills with real practice tests",
                beginner: "Beginner",
                intermediate: "Intermediate",
                advanced: "Advanced",
                download: "Download Test"
            },
            ru: {
                back: "Назад",
                practiceTests: "Практические тесты",
                subtitle: "Оттачивайте грамматические навыки с помощью реальных тестов",
                beginner: "Начальный",
                intermediate: "Средний",
                advanced: "Продвинутый",
                download: "Скачать тест"
            },
            uz: {
                back: "Orqaga",
                practiceTests: "Amaliyot Testlari",
                subtitle: "Grammatika ko'nikmalarini real testlar bilan mustahkamlang",
                beginner: "Boshlang'ich",
                intermediate: "O'rta",
                advanced: "Ilg'or",
                download: "Testni yuklab olish"
            }
        };

        let currentLang = localStorage.getItem('summage_preferred_lang') || 'en';

        function t(key) {
            return translations[currentLang]?.[key] || translations.en[key] || key;
        }

        // Practice Tests Data
        const practiceTests = [
            {
                id: 1,
                level: "beginner",
                title: "Present Tenses Mastery",
                desc: "Test your understanding of Present Simple, Continuous, and Perfect.",
                questions: 25,
                time: 30,
                file: "/tests/beginner-present-tenses.pdf"
            },
            {
                id: 2,
                level: "beginner",
                title: "Basic Grammar Check",
                desc: "Articles, prepositions, and simple sentence structures.",
                questions: 20,
                time: 25,
                file: "/tests/beginner-basic-grammar.pdf"
            },
            {
                id: 3,
                level: "intermediate",
                title: "Past & Future Tenses",
                desc: "Past Simple, Continuous, Perfect and Future forms.",
                questions: 30,
                time: 40,
                file: "/tests/intermediate-past-future.pdf"
            },
            {
                id: 4,
                level: "intermediate",
                title: "Conditionals & Modals",
                desc: "First, Second, Third conditionals and modal verbs.",
                questions: 28,
                time: 35,
                file: "/tests/intermediate-conditionals-modals.pdf"
            },
            {
                id: 5,
                level: "advanced",
                title: "Advanced Grammar Challenge",
                desc: "Mixed conditionals, subjunctive, inversion, and relative clauses.",
                questions: 35,
                time: 45,
                file: "/tests/advanced-grammar-challenge.pdf"
            },
            {
                id: 6,
                level: "advanced",
                title: "Complex Structures Test",
                desc: "Passive voice, reported speech, and phrasal verbs.",
                questions: 32,
                time: 40,
                file: "/tests/advanced-complex-structures.pdf"
            }
        ];

        function renderTests() {
            const container = document.getElementById("tests-container");
            
            let html = `
                <div class="max-w-6xl mx-auto">
                    <h1 class="page-title">${t('practiceTests')}</h1>
                    <p class="page-subtitle">${t('subtitle')}</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            `;

            practiceTests.forEach(test => {
                html += `
                    <div class="test-card">
                        <div class="test-header">
                            <div class="test-level">${t(test.level)}</div>
                            <div class="test-title">${test.title}</div>
                            <p class="test-desc">${test.desc}</p>
                        </div>
                        <div class="test-footer">
                            <a href="${test.file}" 
                               download 
                               class="download-btn">
                                <i class="fa-solid fa-download"></i> ${t('download')}
                            </a>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function goBack() {
            const before = window.location.href;
            
            history.back();
            
            setTimeout(() => {
                if (window.location.href === before) {
                    window.location.assign('/');
                }
            }, 50);
        }

        function updateLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('summage_preferred_lang', lang);
            document.documentElement.lang = lang;
            renderTests();
        }

        // Initialize Page
        window.addEventListener('load', () => {
            renderTests();

            // Language Selector
            document.getElementById('lang-btn').addEventListener('click', e => {
                e.stopPropagation();
                document.getElementById('lang-flags').classList.toggle('show');
            });

            document.querySelectorAll('.flag').forEach(el => {
                el.addEventListener('click', e => {
                    e.stopPropagation();
                    updateLanguage(el.dataset.lang);
                    document.getElementById('lang-flags').classList.remove('show');
                });
            });

            document.addEventListener('click', () => {
                document.getElementById('lang-flags').classList.remove('show');
            });

            // Hide loader
            setTimeout(() => {
                document.getElementById('pageLoader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('pageLoader').remove();
                }, 1000);
            }, 600);
        });
    </script>
</body>
</html>
