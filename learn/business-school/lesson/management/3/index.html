<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Summage - Fundamentals of Modern Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LZP4KSPR1V"></script>
  <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
  
      gtag('config', 'G-LZP4KSPR1V');
  </script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDX73k3QqXr9xu_PKkQBkr9pUNp7zmtrW0",
    authDomain: "summage-backend.firebaseapp.com",
    projectId: "summage-backend",
    storageBucket: "summage-backend.firebasestorage.app",
    messagingSenderId: "128191434358",
    appId: "1:128191434358:web:4c9e9f4f9ff4a23db5d957"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let bubbles = [
    "Yowza! How are you? Welcome to Lesson 3 where we will discuss Leadership in Reality.",
    "We already talked about leading yourself and building strategy.",
    "Now comes the hardest part: actually leading real people.",
    "This is where theory meets mess and where great leaders are made.",
    "First of all, Psychology of Motivation. You must understand people are not machines.",
    "You can’t just pay them more or shout louder and expect them to care.",
    "Real motivation comes from feeling seen, trusted and part of something bigger.",
    "Do my people feel like they matter here? Ask yourself this right now!",
    "Next thing... Communication Clarity. Let's be honest here. Most conflicts start with misunderstanding.",
    "Say what you mean, mean what you say! and repeat it until everyone gets it! That's how simple it is.",
    "I used to think being vague made me look smart. It just made everyone confused!",
    "Be brutally clear.. especially when it’s uncomfortable!",
    "Alllright! Feedback Systems. Good leaders do NOT wait for yearly reviews.",
    "They create safe, regular ways for their people to hear truth and accept it instead of turning defensive.",
    "Give feedback weekly if you can. Make it short, specific and kind but honest.",
    "And ask for it back. If you’re not getting feedback, you’re probably scaring people. That's the important part!",
    "Disagreements are normal and even healthy. Let's talk about Conflict Navigation now...",
    "But left alone they poison teams. It is better to address them early and directly.",
    "Sit down and listen first. Speak second and only then look for the real need behind the words.",
    "Most fights end when both sides feel truly heard. Reflect on yourself now, my friend!",
    "Oh, Delegation Mastery. This is hard for most of us.",
    "You think: if I do it myself it’ll be perfect. But that’s the fastest way to burnout.",
    "You must delegate not just tasks but also outcomes and trust!",
    "Give people room to fail small so they can grow big. That must be your philosophy!",
    "And last but not least... Hiring Basics! Let me tell you clearly. Character beats skill every time.",
    "Skills can be taught. Attitude, honesty and work ethic are really hard to change.",
    "Steve Jobs hired for hunger and taste. Just resumes were not enough.",
    "Satya Nadella rebuilt Microsoft culture by hiring people who learn fast and lift others up.",
    "When you hire, you must ask: Would I really want to work with this person every day?",
    "Okay… that’s the real stuff of leadership for today.",
    "We are just focusing on pure facts! Just what actually works with real humans.",
    "Let’s see what stayed with you. Three quick questions as usual. But answer from the heart, deal?",
    "Ready? Let’s go."
  ];

  const lessonCards = [
    { title: "Welcome to Leadership in Reality", body: `<p>Lesson 1 was you. Lesson 2 was direction. Now comes real people with emotions egos bad days and misunderstandings. This is leadership in the actual mess every day.</p>` },
    { title: "Psychology of Motivation", body: `<p>People don't grind for money alone. They need meaning trust and feeling valued. Without those even high pay fails. Build them in and people push harder when things get tough.</p>` },
    { title: "Communication Clarity", body: `<p>Vague words break teams fast. Say exactly what success looks like by when and why. Direct feels hard but clear beats confusion frustration and resentment every time.</p>` },
    { title: "Feedback Systems", body: `<p>Yearly reviews are too late. Give short honest feedback right after good or bad. Ask for it back too. Frequent loops build trust and stop small problems growing big.</p>` },
    { title: "Conflict Navigation", body: `<p>Conflict is normal when people care. Listen first until they feel heard. Ask the real need not the first complaint. Most tension fades once people stop feeling attacked.</p>` },
    { title: "Delegation Mastery", body: `<p>Don't just delegate tasks. Delegate outcomes with context and guardrails. Let people figure out how. Small failures teach. Micromanage and you stay stuck doing it all forever.</p>` },
    { title: "Hiring Basics", body: `<p>Skills get taught. Character rarely changes. Hire for hunger honesty and fast learning first. Technical ability comes second. Pick people you'd want beside you in tough months.</p>` },
    { title: "Quick Check Time", body: `<p>Three questions to see what stayed today. Answer honestly no pressure. Before sleep write three small things you did or decided that moved the team forward. Small counts.</p>` },
    { title: "Lesson 3 Complete!", body: `<p>Leading people is messy human exhausting and meaningful. No clean formula just daily practice and small improvements each week. Keep showing up. You're getting stronger every day.</p><p>You've got this.</p>` }
  ];

  // bubbleToCardMap — one number per bubble, same number = same card (topic group)
  const bubbleToCardMap = [
    0, 0, 0, 0,              // Welcome + intro (4 bubbles)
    1, 1, 1, 1,                // Motivation psychology (3 bubbles)
    2, 2, 2, 2,                // Communication clarity (3 bubbles)
    3, 3, 3, 3,                // Feedback systems (3 bubbles)
    4, 4, 4, 4,                // Conflict navigation (3 bubbles)
    5, 5, 5, 5,                // Delegation mastery (3 bubbles)
    6, 6, 6, 6, 6,             // Hiring basics + Jobs/Nadella (4 bubbles)
    7, 7, 7, 8,               // Quiz intro + ready (4 bubbles)
  ];

  const finalQuizzes = [
    {
      question: "What matters most when hiring someone new?",
      options: [
        "Only their technical skills and experience",
        "Their character, attitude, and ability to learn fast",
        "How many certificates they have",
        "Whether they went to a famous university"
      ],
      correct: 1
    },
    {
      question: "What’s the fastest way to kill team motivation?",
      options: [
        "Giving too much feedback",
        "Making people feel unseen and not valued",
        "Paying them more money",
        "Letting them work from home"
      ],
      correct: 1
    },
    {
      question: "Which leader rebuilt Microsoft by focusing on culture, learning, and empathy?",
      options: [
        "Steve Jobs",
        "Satya Nadella",
        "Elon Musk",
        "Jeff Bezos"
      ],
      correct: 1
    }
  ];

  const professorImages = ["/assets/images/redy.jpg", "/assets/images/redy2.jpg", "/assets/images/redy3.jpg"];

  // ── DOM Elements ──
  const speechBubble         = document.getElementById("speechBubble");
  const professorImg         = document.getElementById("professorImg");
  const mobileBubbleContainer = document.getElementById("mobileBubbleContainer");
  const mobileProfessorImg   = document.getElementById("mobileProfessorImg");
  const mobileSpeechText     = document.getElementById("mobileSpeechText");
  const prevBtn              = document.getElementById("prevBtn");
  const nextBtn              = document.getElementById("nextBtn");
  const completionCard       = document.getElementById("completion-card");
  const goToLesson2Btn       = document.getElementById("goToLesson2");
  const backToMenuBtn        = document.getElementById("backToMenu");
  const lessonCard           = document.getElementById("lessonCard");
  const cardTitle            = document.getElementById("cardTitle");
  const cardBody             = document.getElementById("cardBody");
  const quizModal            = document.getElementById("quiz-modal");
  const quizQuestion         = document.getElementById("quiz-question");
  const quizOptions          = document.getElementById("quiz-options");
  const quizTitle            = document.querySelector(".quiz-title");

  let currentUser           = null;
  let currentBubbleIndex    = 0;
  let isAnimating           = false;
  let nextBtnCooldown       = false;
  let quizActive            = false;
  let correctAnswers        = 0;
  let currentQuizIndex      = 0;

  // ── Greeting (unchanged) ──
  async function loadUserNameAndUpdateGreeting() {
    if (!currentUser?.uid) return;
    try {
      let displayName = null;
      let profileRef = doc(db, "users", currentUser.uid, "profile", "info");
      let snap = await getDoc(profileRef);

      if (snap.exists() && snap.data()?.displayName?.trim()) {
        displayName = snap.data().displayName.trim();
      } else {
        profileRef = doc(db, "users", currentUser.uid);
        snap = await getDoc(profileRef);
        if (snap.exists()) {
          const data = snap.data();
          displayName = data.displayName || data.name || data.fullName || null;
        }
      }

      let greetingName = "friend";
      if (displayName) {
        greetingName = displayName.split(/\s+/)[0];
        greetingName = greetingName.charAt(0).toUpperCase() + greetingName.slice(1).toLowerCase();
      }

      const possibleGreetings = [
        `Salom ${greetingName}! Welcome to Lesson 1 — Self Leadership.`,
        `Hey ${greetingName}, ready to become the leader of your own life first?`,
        `Hello ${greetingName}! This lesson is about mastering yourself before leading others.`,
        `Salom ${greetingName}! Let's start where everything real begins — inside you.`,
        `Hi ${greetingName}, great to see you. Self-leadership is the foundation — let's build it strong.`
      ];

      bubbles[0] = possibleGreetings[Math.floor(Math.random() * possibleGreetings.length)];
      if (currentBubbleIndex === 0) showBubble(0);
    } catch (err) {
      console.error("Failed to load user name:", err);
    }
  }

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (!user) signInAnonymously(auth).catch(console.error);
    else loadUserNameAndUpdateGreeting();
  });

  function showBubble(index) {
    if (index < 0 || index >= bubbles.length) return;
    currentBubbleIndex = index;

    const randImg = professorImages[Math.floor(Math.random() * professorImages.length)];
    if (professorImg) professorImg.src = randImg;
    if (mobileProfessorImg) mobileProfessorImg.src = randImg;

    const text = bubbles[index];

    if (speechBubble) speechBubble.classList.remove("visible");
    if (mobileSpeechText) mobileSpeechText.classList.remove("visible");

    nextBtn.disabled = true;
    nextBtnCooldown = true;
    isAnimating = true;

    setTimeout(() => {
      if (speechBubble) speechBubble.textContent = text;
      if (mobileSpeechText) mobileSpeechText.textContent = text;

      if (speechBubble) speechBubble.classList.add("visible");
      if (mobileSpeechText) mobileSpeechText.classList.add("visible");

      // Update card ONLY when the topic/section changes (using map)
      const targetCardIndex = bubbleToCardMap[index] || 0;
      if (targetCardIndex !== currentCardIndex) {
        updateLessonCard(targetCardIndex);
        currentCardIndex = targetCardIndex; // remember last card
      }

      setTimeout(() => {
        isAnimating = false;
        startNextButtonCountdown(2);
      }, 400);
    }, 400);
  }

  let currentCardIndex = 0; // new variable to track last shown card

  function startNextButtonCountdown(seconds) {
    let count = seconds;
    const originalText = nextBtn.textContent;

    const interval = setInterval(() => {
      if (count > 0) {
        nextBtn.textContent = count;
        count--;
      } else {
        nextBtn.textContent = originalText;
        nextBtnCooldown = false;
        if (!quizActive) nextBtn.disabled = false;
        clearInterval(interval);
      }
    }, 1000);
  }

  function updateLessonCard(index) {
    const card = lessonCards[index];
    cardTitle.textContent = card.title;
    cardBody.innerHTML = card.body;

    lessonCard.classList.remove("visible");
    void lessonCard.offsetWidth;
    lessonCard.classList.add("visible");
  }

  // ── Final Quiz & Completion (unchanged) ──
  function showFinalQuiz() {
    quizActive = true;
    nextBtn.disabled = true;
    correctAnswers = 0;
    currentQuizIndex = 0;
    showNextQuizQuestion();
  }

  function showNextQuizQuestion() {
    if (currentQuizIndex >= finalQuizzes.length) {
      if (correctAnswers === finalQuizzes.length) {
        quizTitle.textContent = "You did it! 🎉";
        quizQuestion.textContent = "Perfect! Lesson 3 is done.";
        quizOptions.innerHTML = `<p style="color:#10b981; font-weight:600; margin:20px 0;">Great job — keep practicing these ideas every day.</p>`;
        setTimeout(() => {
          quizModal.style.display = "none";
          quizActive = false;
          markLessonCompleted();
        }, 2200);
      } else {
        quizModal.style.display = "none";
        quizActive = false;
        currentBubbleIndex = 0;
        showBubble(0);
        updateLessonCard(0);
        alert("Some answers were off. Let’s go back and review the key points together!");
      }
      return;
    }

    const quiz = finalQuizzes[currentQuizIndex];
    quizTitle.textContent = `Final Check (${currentQuizIndex + 1}/${finalQuizzes.length})`;
    quizQuestion.textContent = quiz.question;

    quizOptions.innerHTML = "";
    quiz.options.forEach((option, i) => {
      const btn = document.createElement("button");
      btn.className = "quiz-option-btn";
      btn.textContent = option;
      btn.onclick = () => handleFinalQuizAnswer(i, quiz.correct);
      quizOptions.appendChild(btn);
    });

    quizModal.style.display = "flex";
  }

  function handleFinalQuizAnswer(selected, correct) {
    if (selected === correct) correctAnswers++;
    currentQuizIndex++;
    showNextQuizQuestion();
  }

  async function markLessonCompleted() {
    if (!currentUser) {
      showCompletionCard();
      return;
    }
    try {
      const progressRef = doc(db, "users", currentUser.uid, "progress", "management");
      await setDoc(progressRef, { lessons: { "3": true } }, { merge: true });
      console.log("Lesson 3 marked as completed");
    } catch (err) {
      console.error("Save failed:", err);
    }
    showCompletionCard();
  }

  function showCompletionCard() {
    completionCard.style.display = "flex";
  }

  prevBtn.addEventListener("click", () => {
    if (currentBubbleIndex > 0 && !isAnimating && !quizActive && !nextBtnCooldown) {
      showBubble(currentBubbleIndex - 1);
      // On prev, also sync card to the correct one for that bubble
      const targetCardIndex = bubbleToCardMap[currentBubbleIndex] || 0;
      if (targetCardIndex !== currentCardIndex) {
        updateLessonCard(targetCardIndex);
        currentCardIndex = targetCardIndex;
      }
    }
  });

  nextBtn.addEventListener("click", () => {
    if (isAnimating || quizActive || nextBtnCooldown) return;

    if (currentBubbleIndex < bubbles.length - 1) {
      const nextIndex = currentBubbleIndex + 1;
      showBubble(nextIndex);
      // Card update is now handled inside showBubble via map
    } else {
      showFinalQuiz();
    }
  });

  goToLesson2Btn.addEventListener("click", () => {
    window.location.href = "/learn/business-school/lesson/management/4/";
  });

  backToMenuBtn.addEventListener("click", () => {
    window.location.href = "/learn/business-school/?id=management";
  });

  function goBack() {
    const before = window.location.href;
    history.back();
    setTimeout(() => {
      if (window.location.href === before) {
        window.location.assign('/learn/business-school/?id=management');
      }
    }, 50);
  }

  document.getElementById('desktop-back-btn')?.addEventListener('click', goBack);

  // Initial load
  showBubble(0);
  updateLessonCard(0);

  // Splash screen logic
        const loader = document.getElementById('pageLoader');
        const owl = document.getElementById('splashOwl');

        const MIN_DURATION = 1500;
        let minTimePassed = false;

        setTimeout(() => {
            if (owl) {
                owl.style.opacity = '1';
                owl.style.transform = 'scale(1) translateY(0)';
            }
        }, 400);

        setTimeout(() => {
            minTimePassed = true;
            if (document.readyState === 'complete') hideLoader();
        }, MIN_DURATION);

        window.addEventListener('load', () => {
            if (minTimePassed) {
                hideLoader();
            } else {
                setTimeout(hideLoader, MIN_DURATION);
            }
        });

        function hideLoader() {
            if (loader.classList.contains('hidden')) return;
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 1400);
        }

        setTimeout(() => hideLoader(), 7000);
</script>
  <link rel="stylesheet" href="/learn/business-school/lesson/lesson-style.css">
</head>
<body>

  <div id="pageLoader" class="page-loader">
        <lottie-player 
            id="splashOwl"
            src="/assets/Sandy Loading.json"
            background="transparent" 
            speed="0.9" 
            style="width: 120px; height: 120px; opacity: 0; transform: scale(0.7) translateY(20px);"
            loop 
            autoplay>
        </lottie-player>
    </div>

  <header>
    <button class="header-back-btn" id="desktop-back-btn">Back</button>
    <div class="header-brand">
      <img src="/assets/logo.jpg" alt="Summage Logo" class="header-logo">
      SUMMAGE
    </div>
  </header>
  
  <div class="main-content">
    <!-- DYNAMIC LESSON CARD (replaces old hero + key-points + extra-info) -->
    <div class="lesson-card" id="lessonCard">
      <h2 class="card-title" id="cardTitle"></h2>
      <div class="card-body" id="cardBody"></div>
    </div>
  </div>

  <!-- Desktop professor + bubble -->
  <div class="professor-section">
    <div class="professor-wrapper">
      <div class="speech-bubble" id="speechBubble"></div>
      <img id="professorImg" class="professor" src="/assets/images/redy.jpg" alt="Professor">
    </div>
  </div>

  <!-- Mobile Bubble Container -->
  <div class="mobile-bubble-container" id="mobileBubbleContainer">
    <img class="mobile-professor" id="mobileProfessorImg" src="/assets/images/redy.jpg" alt="Professor">
    <div class="mobile-text-wrapper">
      <div class="mobile-speech-text" id="mobileSpeechText"></div>
    </div>
  </div>

  <div class="globe-deco">
    <img src="/assets/images/globus.jpg" alt="Decorative globe illustration">
  </div>

  <div class="bottom-nav">
    <div class="nav-buttons">
      <button class="nav-btn back-btn" id="prevBtn">What was that?</button>
      <button class="nav-btn" id="nextBtn">OK</button>
    </div>
  </div>

  <!-- Quiz Modal -->
  <div id="quiz-modal">
    <div class="quiz-content">
      <h2 class="quiz-title">Quick Check</h2>
      <p id="quiz-question" class="quiz-question"></p>
      <div id="quiz-options" class="quiz-options"></div>
      <small style="color:#6b7280; margin-top:16px; display:block;">Answer correctly to continue</small>
    </div>
  </div>

  <!-- Completion Card -->
  <div id="completion-card">
    <div class="card-content">
      <h2 class="card-title">You have completed Lesson 3!</h2>
      <p style="color:#4b5563; margin-bottom:24px;">Great job! You're making solid progress.</p>

      <div class="card-buttons">
        <button class="card-btn" id="goToLesson2">Go to Lesson 4</button>
        <button class="card-btn secondary" id="backToMenu">Back to Business School</button>
      </div>
    </div>
  </div>

</body>
</html>
