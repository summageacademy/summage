<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up / Log In</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  }

  body {
    height: 100dvh;
    min-height: 100dvh;
    background: linear-gradient(135deg, #fffaf5 0%, #f8f9fa 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .white-fade {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none; /* Allows clicks to pass through when invisible */
    transition: opacity 0.45s ease;
    z-index: 90; /* Below error modal (100), above everything else */
  }

  .white-fade.active {
    opacity: 1;
    pointer-events: auto;
  }

  .container {
    width: 100%;
    max-width: 1400px;
    height: 100%;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    position: relative;
  }

  /* Desktop Layout */
  .left {
    width: 59%;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 30px; /* Reduced gap to bring everything closer */
    text-align: center;
  }

  .right {
    width: 41%;
    background: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0px 40px 3px 0px;
    margin-right: 3vh;
  }

  /* Common */
  h1 {
    font-size: clamp(3.2rem, 6vw, 4.8rem);
    font-weight: 800;
    line-height: 1.05;
    color: #ff6523;
    margin-bottom: 10px; /* Much smaller margin */
  }

  h2 {
    font-size: 2rem;
    font-weight: 700;
    color: #f24b0b;
    margin-bottom: 20px;
  }

  .buttons-group {
    display: flex;
    flex-direction: column;
    gap: 20px; /* Tighter buttons */
    width: 100%;
    max-width: 360px;
  }

  .btn {
    padding: 18px 40px;
    font-size: 17px;
    font-weight: 700;
    text-transform: uppercase;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.8px;
    width: 100%;
  }

  .btn-primary {
    background: #f24b0b;
    color: white;
    box-shadow: 0 8px 0 #c23a0a;
  }

  .btn-primary:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 0 #c23a0a;
  }

  .btn-primary:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 #c23a0a;
  }

  .btn-secondary {
    background: #06a87c;
    color: white;
    box-shadow: 0 8px 0 #058f66;
  }

  .btn-secondary:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 0 #058f66;
  }

  .illustration {
    max-width: 95%;  /* Much larger on desktop */
    max-height: 95%; /* Takes almost full space → feels very close */
    object-fit: contain;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
    margin-right: 20vh;
  }

  .hidden { display: none !important; }

  .form-wrapper {
    width: 100%;
    max-width: 360px;
  }

  .form-group {
    margin-bottom: 24px;
    width: 100%;
  }

  label {
    display: block;
    margin-bottom: 10px;
    font-weight: 600;
    color: #333;
    text-align: left;
  }

  input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    padding: 16px;
    border: 2px solid #ddd;
    border-radius: 16px;
    font-size: 1.1rem;
    background: white;
  }

  .checkbox-label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.95rem;
    margin: 30px 0 40px 0;
    color: #555;
    text-align: left;
  }

  .checkbox-label input[type="checkbox"] {
    margin-top: 4px;
    flex-shrink: 0;
  }

  .checkbox-label a {
    color: #f24b0b;
    text-decoration: none;
  }

  .mobile-content {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .mobile-illust {
    max-width: 250px;
    height: auto;
    margin-bottom: 4vh;
    margin-top: 4vh;
    display: none;
  }

  /* Mobile Layout */
  @media (max-width: 900px) {
    body {
      align-items: flex-start;
    }

    .container {
      flex-direction: column;
      height: auto;
      min-height: 100dvh;
      overflow-y: auto;
    }

    /* Illustration section - NO hugging the top anymore */
    .right {
      display: none;
    }

    .mobile-illust {
      display: block;
    }

    .illustration {
      max-height: 250px; /* Even larger owl */
      width: auto;
      margin-top: 20px; /* Extra push down if needed */
    }

    .left {
      width: 100%;
      padding: 0 20px 80px; /* Zero top padding → title starts immediately after illustration section */
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center; /* Center content vertically for balance */
      align-items: center;
      gap: 24px;
      margin-top: 20px; /* Small gap between illustration and title */
    }

    /* Title and buttons much closer to the owl */
    h1 {
      font-size: 2.7rem;
      margin-bottom: 8px;
      margin-top: 0;
    }

    h2 {
      font-size: 1.75rem;
      margin-bottom: 16px;
      margin-top: 0;
    }

    .btn {
      padding: 16px 20px;
      font-size: 16.5px;
      border-radius: 40px;
    }

    .buttons-group {
      gap: 16px;
      width: 100%;
      margin-bottom: 5vh;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .checkbox-label {
      margin: 20px 0 30px 0;
      font-size: 0.92rem;
    }

    input[type="text"], input[type="email"], input[type="password"] {
      padding: 18px;
      font-size: 1.2rem;
    }
    .mobile-content {
      /* Removed margin-top: auto; to allow centering */
    }
  }

  /* Extra small screens */
  @media (max-width: 400px) or (max-height: 700px) {
    .right {
      display: none;
    }

    .illustration {
      max-height: 160px;
    }

    .mobile-illust {
      display: block;
    }

    .left {
      padding: 0 15px 70px;
      gap: 20px;
      margin-top: 10px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 6px;
    }

    h2 {
      margin-bottom: 14px;
    }
    .mobile-content {
      /* Removed margin-top: auto; to allow centering */
    }
  }

  /* Error Modal remains unchanged */
  #errorModal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,255,255,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  #errorModal img {
    max-width: 80%;
    max-height: 50vh;
    margin-bottom: 40px;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
  }

  #errorMessage {
    font-size: 1.9rem;
    font-weight: 600;
    text-align: center;
    max-width: 80%;
    color: #f24b0b;
    margin-bottom: 40px;
  }

  #closeError {
    padding: 16px 48px;
    font-size: 1.3rem;
    background: #f24b0b;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 0 #c23a0a;
    transition: all 0.25s;
  }

  #closeError:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 0 #c23a0a;
  }
  .page-loader {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #fffaf5 0%, #f8f9fa 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 1.25s cubic-bezier(0.4, 0, 0.2, 1); /* elegant, slow fade-out */
  }

  .page-loader.hidden {
    opacity: 0;
    visibility: hidden;
  }

  /* Ultra-smooth entrance: fade + rise + scale */
  #splashOwl {
    transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1); /* bouncy overshoot */
    will-change: opacity, transform; /* performance boost */
  }

  /* Accessibility */
  @media (prefers-reduced-motion: reduce) {
    #splashOwl,
    .page-loader,
    .page-loader.hidden {
      transition: none !important;
      opacity: 1;
      transform: none;
    }
  }
  
  /* Hide scrollbar completely but keep scroll functionality */
  html, body {
    -ms-overflow-style: none;          /* IE and Edge */
    scrollbar-width: none;             /* Firefox */
  }

  /* For WebKit browsers (Chrome, Safari, new Edge, Opera, etc.) */
  html::-webkit-scrollbar,
  body::-webkit-scrollbar {
    display: none;
  }

  /* Ensure it also applies when .container is scrollable */
  .container {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  .container::-webkit-scrollbar {
    display: none;
  }
</style>
</head>
<body>
  <div id="pageLoader" class="page-loader">
    <lottie-player 
      id="splashOwl"
      src="/assets/Sandy Loading.json"
      background="transparent" 
      speed="0.9" 
      style="width: 120px; height: 120px; opacity: 0; transform: scale(0.7) translateY(20px);"
      loop 
      autoplay>
    </lottie-player>
  </div>
  <!-- White fade overlay -->
  <div id="whiteFade" class="white-fade"></div>

  <div class="container">
    <!-- Left side -->
    <div class="left" id="leftSide">
      <div class="mobile-content" id="initialContent">
        <img class="mobile-illust" src="/assets/images/illustrations/hq-redy.webp" alt="Summage Academy">
        <h1 id="mainTitle" style="margin-bottom: 30px;" data-lang-key="welcome.title">Let's Get<br>Started</h1>

        <div class="buttons-group" id="initialButtons">
          <button class="btn btn-primary" id="signupBtn" data-lang-key="button.signup">Sign Up</button>
          <button class="btn btn-secondary" id="loginBtn" data-lang-key="button.login">Log In</button>
        </div>
      </div>

      <!-- Goal selection -->
      <div class="mobile-content hidden" id="goalSelection">
        <img class="mobile-illust" src="/assets/images/illustrations/redy_idea.webp" alt="Goal">
        <h2 data-lang-key="goal.title">What would you like to do?</h2>
        <div class="buttons-group">
          <button class="btn btn-primary" id="learnEnglish" data-lang-key="goal.learnEnglish">Learn English</button>
          <button class="btn btn-primary" id="businessSchool" data-lang-key="goal.businessSchool">Business School</button>
          <button class="btn btn-primary" id="startBlogging" data-lang-key="goal.startBlogging">Start Blogging</button>
        </div>
      </div>

      <!-- English level -->
      <div class="mobile-content hidden" id="englishLevel">
        <img class="mobile-illust" src="/assets/images/illustrations/redy_trustworthy.webp" alt="Goal">
        <h2 data-lang-key="level.title">What's your English level?</h2>
        <div class="buttons-group">
          <button class="btn btn-primary" id="beginner">Beginner</button>
          <button class="btn btn-primary" id="intermediate">Intermediate</button>
          <button class="btn btn-primary" id="advanced">Advanced</button>
        </div>
      </div>

      <!-- Business sub-selection -->
      <div class="mobile-content hidden" id="businessSub">
        <img class="mobile-illust" src="/assets/images/illustrations/redy_trustworthy.webp" alt="Business">
        <h2 data-lang-key="business.ageTitle">How old are you?</h2>
        <div class="buttons-group">
          <button class="btn btn-primary" id="ageUnder18" data-lang-key="business.ageUnder18">Under 18</button>
          <button class="btn btn-primary" id="age18to30"  data-lang-key="business.age18to30">18-30</button>
          <button class="btn btn-primary" id="ageOver30"  data-lang-key="business.ageOver30">Over 30</button>
        </div>
      </div>

      <div class="mobile-content hidden" id="businessCourse">
        <img class="mobile-illust" src="/assets/images/illustrations/redy_manager.webp" alt="Business">
        <h2 data-lang-key="business.courseTitle">Which course interests you?</h2>
        <div class="buttons-group">
          <button class="btn btn-primary" id="courseManagement" data-lang-key="business.courseManagement">Management</button>
          <button class="btn btn-primary" id="courseSales"      data-lang-key="business.courseSales">Sales</button>
          <button class="btn btn-primary" id="courseMarketing"  data-lang-key="business.courseMarketing">Marketing</button>
          <button class="btn btn-primary" id="courseOther"      data-lang-key="business.courseOther">Other</button>
        </div>
      </div>

      <!-- Final sign up form -->
      <div class="mobile-content hidden" id="finalSignup">
        <h2 data-lang-key="signup.lastStep">Last step to complete your account</h2>
        <div class="form-wrapper">
          <div class="form-group">
            <label data-lang-key="signup.fullName">Full Name</label>
            <input type="text" id="finalName" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label data-lang-key="signup.email">Email</label>
            <input type="email" id="finalEmail" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label data-lang-key="signup.password">Password</label>
            <input type="password" id="finalPassword" placeholder="At least 6 characters" required>
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="termsCheckbox" required>
            <span data-lang-key="signup.acceptTerms">I accept the <a href="/terms/">Terms</a> and <a href="/privacy/">Privacy Policy</a></span>
          </label>
          <button class="btn btn-primary" id="completeSignup" data-lang-key="button.createAccount">Create Account</button>
        </div>
      </div>

      <!-- Start Blogging form -->
      <div class="mobile-content hidden" id="bloggingForm">
        <h2 data-lang-key="blog.title">Tell us about your blogging interest</h2>
        <div class="form-wrapper">
          <div class="form-group">
            <label data-lang-key="blog.fullName">Full Name</label>
            <input type="text" id="blogName" required>
          </div>
          <div class="form-group">
            <label data-lang-key="blog.email">Email</label>
            <input type="email" id="blogEmail" required>
          </div>
          <div class="form-group">
            <label data-lang-key="blog.telegram">Telegram Username (optional)</label>
            <input type="text" id="blogTelegram">
          </div>
          <div class="form-group">
            <label data-lang-key="blog.topic">What do you want to write about?</label>
            <input type="text" id="blogTopic" required>
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="blogTerms" required>
            <span data-lang-key="blog.acceptTerms">I accept the <a href="/terms/">Terms</a> and <a href="/privacy/">Privacy Policy</a></span>
          </label>
          <button class="btn btn-primary" id="submitBlogging" data-lang-key="button.submitRequest">Submit Request</button>
        </div>
      </div>

      <!-- Login form -->
      <div class="mobile-content hidden" id="loginForm">
        <img class="mobile-illust" src="/assets/images/illustrations/redy_login.webp" alt="Login">
        <h2 data-lang-key="login.title">Log In</h2>
        <div class="form-wrapper">
          <div class="form-group">
            <label data-lang-key="login.email">Email</label>
            <input type="email" id="loginEmail" required>
          </div>
          <div class="form-group">
            <label data-lang-key="login.password">Password</label>
            <input type="password" id="loginPassword" required>
          </div>
          <button class="btn btn-primary" id="doLogin" data-lang-key="button.logIn">Log In</button>
        </div>
      </div>
    </div>

    <!-- Right side illustrations - top on mobile -->
    <div class="right" id="rightSide">
      <img src="/assets/images/illustrations/hq-redy.webp" class="illustration" id="mainIllust" alt="Welcome">
      <img src="/assets/images/illustrations/redy_trustworthy.webp" class="illustration hidden" id="goalIllust" alt="Goal">
      <img src="/assets/images/illustrations/redy_manager.webp" class="illustration hidden" id="businessIllust" alt="Business">
      <img src="/assets/images/illustrations/redy_idea.webp" class="illustration hidden" id="blogIllust" alt="Blogging">
      <img src="/assets/images/illustrations/redy_login.webp" class="illustration hidden" id="loginIllust" alt="Login">
    </div>
  </div>

  <!-- Error Modal -->
  <div id="errorModal" class="hidden">
    <img src="/assets/images/redy3.jpg" alt="Sad owl">
    <div id="errorMessage" data-lang-key="error.generic">Oh no! Something went wrong.</div>
    <button id="closeError" data-lang-key="button.ok">OK</button>
  </div>

  const LANG_KEY = 'summage_preferred_lang';
  let currentLang = localStorage.getItem(LANG_KEY) || 'en';

  function applyTranslations() {
    document.querySelectorAll('[data-lang-key]').forEach(el => {
      const key = el.getAttribute('data-lang-key');
      const translated = translations[currentLang]?.[key] ?? translations['en'][key] ?? el.innerHTML;
      el.innerHTML = translated;
    });
    document.documentElement.lang = currentLang;
  }

  function showMessage(key, fallback = translations['en']['error.generic']) {
    const msg = translations[currentLang]?.[key] ?? translations['en'][key] ?? fallback;
    document.getElementById('errorMessage').innerHTML = msg;
    document.getElementById('errorModal').classList.remove('hidden');
  }

  // ───────────────────────────────────────────────────────────────
  // FIREBASE & APP LOGIC
  // ───────────────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDX73k3QqXr9xu_PKkQBkr9pUNp7zmtrW0",
    authDomain: "summage-backend.firebaseapp.com",
    projectId: "summage-backend",
    storageBucket: "summage-backend.firebasestorage.app",
    messagingSenderId: "128191434358",
    appId: "1:128191434358:web:4c9e9f4f9ff4a23db5d957"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  const mainTitle = document.getElementById('mainTitle');
  const initialButtons = document.getElementById('initialButtons');
  const goalSelection = document.getElementById('goalSelection');
  const englishLevel = document.getElementById('englishLevel');
  const businessSub = document.getElementById('businessSub');
  const businessCourse = document.getElementById('businessCourse');
  const finalSignup = document.getElementById('finalSignup');
  const bloggingForm = document.getElementById('bloggingForm');
  const loginForm = document.getElementById('loginForm');

  const mainIllust = document.getElementById('mainIllust');
  const goalIllust = document.getElementById('goalIllust');
  const businessIllust = document.getElementById('businessIllust');
  const blogIllust = document.getElementById('blogIllust');
  const loginIllust = document.getElementById('loginIllust');

  let userData = {};

  function fadeTransition(callback) {
    const overlay = document.getElementById('whiteFade');
    overlay.classList.add('active');
    setTimeout(() => {
      callback();
      applyTranslations();
      setTimeout(() => overlay.classList.remove('active'), 50);
    }, 450);
  }

  function hideAllIllusts() {
    [mainIllust, goalIllust, businessIllust, blogIllust, loginIllust].forEach(img => img.classList.add('hidden'));
  }

  document.getElementById('closeError').onclick = () => {
    document.getElementById('errorModal').classList.add('hidden');
  };

  applyTranslations();

  document.getElementById('signupBtn').onclick = () => {
    fadeTransition(() => {
      mainTitle.classList.add('hidden');
      initialButtons.classList.add('hidden');
      document.getElementById('initialContent').classList.add('hidden');
      goalSelection.classList.remove('hidden');
      hideAllIllusts();
      goalIllust.classList.remove('hidden');
    });
  };

  document.getElementById('loginBtn').onclick = () => {
    fadeTransition(() => {
      mainTitle.classList.add('hidden');
      initialButtons.classList.add('hidden');
      document.getElementById('initialContent').classList.add('hidden');
      loginForm.classList.remove('hidden');
      hideAllIllusts();
      loginIllust.classList.remove('hidden');
    });
  };

  // ── Goal selection ──
  document.getElementById('learnEnglish').onclick = () => {
    userData.goal = 'learnEnglish';
    fadeTransition(() => {
      goalSelection.classList.add('hidden');
      englishLevel.classList.remove('hidden');
      hideAllIllusts();
      goalIllust.classList.remove('hidden');
    });
  };

  document.getElementById('businessSchool').onclick = () => {
    userData.goal = 'businessSchool';
    fadeTransition(() => {
      goalSelection.classList.add('hidden');
      businessSub.classList.remove('hidden');
      hideAllIllusts();
      businessIllust.classList.remove('hidden');
    });
  };

  document.getElementById('startBlogging').onclick = () => {
    userData.goal = 'startBlogging';
    fadeTransition(() => {
      goalSelection.classList.add('hidden');
      bloggingForm.classList.remove('hidden');
      hideAllIllusts();
      blogIllust.classList.remove('hidden');
    });
  };

  // ── English level ──
  ['beginner','intermediate','advanced'].forEach(id => {
    document.getElementById(id).onclick = () => {
      userData.level = id;
      fadeTransition(() => {
        englishLevel.classList.add('hidden');
        finalSignup.classList.remove('hidden');
        hideAllIllusts();
        goalIllust.classList.remove('hidden');
      });
    };
  });

  // ── Business age group ──
  ['ageUnder18', 'age18to30', 'ageOver30'].forEach(id => {
    document.getElementById(id).onclick = () => {
      userData.ageGroup = id;
      fadeTransition(() => {
        businessSub.classList.add('hidden');
        businessCourse.classList.remove('hidden');
      });
    };
  });

  // ── Business course ──
  ['courseManagement', 'courseSales', 'courseMarketing', 'courseOther'].forEach(id => {
    document.getElementById(id).onclick = () => {
      userData.course = id;
      fadeTransition(() => {
        businessCourse.classList.add('hidden');
        finalSignup.classList.remove('hidden');
        hideAllIllusts();
        businessIllust.classList.remove('hidden');
      });
    };
  });

  // ── Blogging submit ──
  document.getElementById('submitBlogging').onclick = async () => {
    if (!document.getElementById('blogTerms').checked) {
      showMessage('error.terms');
      return;
    }
    const name = document.getElementById('blogName').value.trim();
    const email = document.getElementById('blogEmail').value.trim();
    const telegram = document.getElementById('blogTelegram').value.trim();
    const topic = document.getElementById('blogTopic').value.trim();

    if (!name || !email || !topic) {
      showMessage('error.fillFields');
      return;
    }

    try {
      await db.collection('bloggingRequests').add({
        name, email, telegram: telegram || 'None', topic,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        status: 'pending'
      });
      showMessage('success.blogSubmitted');
    } catch (error) {
      showMessage('error.blogFailed');
    }
  };

  // ── Final signup ──
  document.getElementById('completeSignup').onclick = async () => {
    if (!document.getElementById('termsCheckbox').checked) {
      showMessage('error.terms');
      return;
    }

    const name     = document.getElementById('finalName').value.trim();
    const email    = document.getElementById('finalEmail').value.trim();
    const password = document.getElementById('finalPassword').value;

    if (!name || !email || !password) {
      showMessage('error.fillFields');
      return;
    }

    const preferredLanguage = localStorage.getItem(LANG_KEY) || 'en';

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;

      await db.collection('users').doc(user.uid).set({
        ...userData,
        name,
        email,
        preferredLanguage,
        agreedToTerms: true,
        agreedToPrivacy: true,
        consentsAcceptedAt: firebase.firestore.FieldValue.serverTimestamp(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });

      await user.updateProfile({ displayName: name });

      window.location.href = '/learn/';
    } catch (error) {
      let key = 'error.generic';
      switch (error.code) {
        case 'auth/email-already-in-use':      key = 'error.emailTaken'; break;
        case 'auth/invalid-email':             key = 'error.invalidEmail'; break;
        case 'auth/weak-password':             key = 'error.weakPassword'; break;
        case 'auth/operation-not-allowed':     key = 'error.operationNotAllowed'; break;
      }
      showMessage(key);
      console.error('Sign-up error:', error);
    }
  };

  document.getElementById('doLogin').onclick = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      showMessage('error.fillFields');
      return;
    }

    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = '/learn/';
    } catch (error) {
      let key = 'error.generic';
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
        key = 'error.invalidEmail';
      } else if (error.code === 'auth/invalid-email') {
        key = 'error.invalidEmail';
      }
      showMessage(key);
    }
  };

  // Page loader
  const loader = document.getElementById('pageLoader');
  const owl = document.getElementById('splashOwl');
  const MIN_DURATION = 1500;
  let minTimePassed = false;

  setTimeout(() => {
    if (owl) {
      owl.style.opacity = '1';
      owl.style.transform = 'scale(1) translateY(0)';
    }
  }, 400);

  setTimeout(() => {
    minTimePassed = true;
    if (document.readyState === 'complete') hideLoader();
  }, MIN_DURATION);

  window.addEventListener('load', () => {
    if (minTimePassed) hideLoader();
    else setTimeout(hideLoader, MIN_DURATION);
  });

  function hideLoader() {
    if (loader.classList.contains('hidden')) return;
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 1400);
  }

  setTimeout(() => hideLoader(), 7000);
</script>
</body>
